name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/rainbow-navigator-dev-gkb1w1
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Site is served from https://<user>.github.io/rainbow-navigator/
      - run: npx vite build --base=/rainbow-navigator/
        env:
          VITE_BASE_PATH: /rainbow-navigator
      # Serve index.html for unknown paths so client-side routing works
      - run: cp dist/index.html dist/404.html
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
